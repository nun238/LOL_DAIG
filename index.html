<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
  <title>LoL 魂のチャンピオン診断 完全版</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* ＝＝＝ 変数定義（LoLカラーパレット） ＝＝＝ */
    :root {
      --gold-1: #c8aa6e;
      --gold-2: #f0e6d2;
      --gold-3: #a09b8c;
      --blue-1: #091428;
      --blue-2: #0a1428;
      --blue-3: #1e2328;
      --blue-4: #010a13;
      --cyan: #0ac8b9;
      --danger: #e84057;
      --magic: #27ae60;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background-color: var(--blue-4); 
      background-image: radial-gradient(circle at top, var(--blue-2) 0%, var(--blue-4) 70%);
      color: var(--gold-2);
      text-align: center;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    h1, h2, h3 { 
      font-family: 'Cinzel', serif; 
      color: var(--gold-1); 
      text-shadow: 0 0 10px rgba(200, 170, 110, 0.3);
      letter-spacing: 2px;
    }

    /* 上部固定プログレスバー */
    #progress-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(10, 20, 40, 0.95);
      backdrop-filter: blur(5px);
      z-index: 99999;
      padding: 15px 0;
      border-bottom: 1px solid var(--gold-1);
      box-shadow: 0 5px 15px rgba(0,0,0,0.8);
    }
    #progress-wrapper.hidden { display: none !important; }
    #progress-container {
      width: 100%; max-width: 540px; height: 6px; 
      background-color: var(--blue-1); border-radius: 3px; 
      margin: 0 auto; overflow: hidden; border: 1px solid #333;
    }
    #progress-bar {
      width: 0%; height: 100%; 
      background: linear-gradient(90deg, #8a6c32, var(--gold-1), var(--gold-2));
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
      box-shadow: 0 0 10px var(--gold-1);
    }

    #app {
      width: 100%; max-width: 600px;
      background: rgba(10, 20, 40, 0.85); backdrop-filter: blur(10px);
      padding: 30px; border-radius: 4px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(200, 170, 110, 0.1);
      border: 1px solid var(--gold-1); position: relative;
      margin: 60px 20px 20px 20px;
    }
    
    #app::before, #app::after {
      content: ''; position: absolute; width: 15px; height: 15px; border: 2px solid var(--gold-1);
    }
    #app::before { top: -5px; left: -5px; border-right: none; border-bottom: none; }
    #app::after { bottom: -5px; right: -5px; border-left: none; border-top: none; }

    .hidden { display: none !important; }

    /* 入力フォーム */
    .input-group { margin-bottom: 30px; text-align: left; }
    .input-group label { display: block; color: var(--gold-1); margin-bottom: 8px; font-weight: bold; font-size: 0.95em; }
    .input-group input { width: 100%; padding: 15px; background: rgba(0,0,0,0.5); border: 1px solid var(--gold-3); color: white; border-radius: 4px; font-size: 1.1em; box-sizing: border-box; outline: none; }
    .input-group input:focus { border-color: var(--cyan); box-shadow: 0 0 10px rgba(10, 200, 185, 0.3); }

    /* ボタン共通 */
    .action-btn {
      position: relative; background: linear-gradient(180deg, #1e283d, #0a1428); color: var(--gold-2);
      border: 1px solid var(--gold-1); padding: 16px 30px; font-size: 1.1em; letter-spacing: 1px;
      border-radius: 2px; cursor: pointer; margin-top: 10px; transition: all 0.3s ease;
      font-weight: bold; width: 100%; max-width: 320px; overflow: hidden;
    }
    .action-btn::before {
      content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(200, 170, 110, 0.4), transparent); transition: 0.5s;
    }
    .action-btn:hover::before { left: 100%; }
    .action-btn:hover { background: linear-gradient(180deg, #2a3852, #12213d); box-shadow: 0 0 15px rgba(200, 170, 110, 0.4); text-shadow: 0 0 5px var(--gold-2); }
    .action-btn:active { transform: scale(0.97); }
    .btn-gold { background: linear-gradient(180deg, #d4b87e, #a38549); color: #010a13; border: 1px solid #f0e6d2; }
    .btn-gold:hover { background: linear-gradient(180deg, #eaddaa, #c8aa6e); color: #000; box-shadow: 0 0 20px rgba(200, 170, 110, 0.6); }
    .btn-gray { background: transparent; color: var(--gold-3); border: 1px solid #555; }
    .btn-gray:hover { border-color: var(--gold-1); color: var(--gold-1); }

    /* 質問 */
    .question-block { margin-bottom: 40px; text-align: left; }
    .question-text { font-size: 1.1em; margin-bottom: 20px; font-weight: bold; color: var(--gold-1); line-height: 1.5; border-bottom: 1px solid rgba(200, 170, 110, 0.2); padding-bottom: 10px; }
    .choice-btn {
      display: block; width: 100%; padding: 18px 20px; margin-bottom: 12px; background: rgba(30, 35, 40, 0.5); color: var(--gold-2); 
      border: 1px solid #3a424e; border-left: 4px solid #3a424e; border-radius: 2px; cursor: pointer; font-size: 0.95em; transition: all 0.2s ease; text-align: left; position: relative;
    }
    .choice-btn:hover:not(.dimmed) { background: rgba(200, 170, 110, 0.1); border-color: var(--gold-1); border-left-color: var(--gold-1); }
    .choice-btn.selected { background: rgba(200, 170, 110, 0.15); color: #fff; transform: translateX(5px); border: 1px solid var(--gold-1); border-left: 4px solid var(--cyan); box-shadow: 0 0 15px rgba(10, 200, 185, 0.2); }
    .choice-btn.selected::after { content: '◆'; position: absolute; right: 20px; color: var(--cyan); font-size: 1.2em; }
    .choice-btn.dimmed { opacity: 0.3; transform: scale(0.98); }
    #quiz-buttons { display: flex; gap: 15px; justify-content: center; margin-top: 30px; }

    /* ＝＝＝ ミニゲーム 円形UI版 ＝＝＝ */
    #minigame-screen h2 { font-size: 1.6em; margin-bottom: 5px; }
    #minigame-screen p { color:var(--gold-3); line-height: 1.4; margin-bottom: 15px; font-size: 0.9em; }
    
    #circle-ui-container {
      position: relative;
      width: 220px;
      height: 220px;
      margin: 10px auto 30px;
    }
    
    /* 100%の目印 */
    #target-marker {
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 24px;
      background: var(--danger);
      box-shadow: 0 0 10px var(--danger);
      z-index: 10;
      border-radius: 2px;
    }

    /* 円形ゲージの外枠 */
    #circle-progress {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: conic-gradient(var(--cyan) 0deg, transparent 0deg);
      box-shadow: 0 0 20px rgba(10, 200, 185, 0.2), inset 0 0 20px rgba(10, 200, 185, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* うっすら見えるゲージの背景軌道 */
    #circle-progress::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      border-radius: 50%; border: 4px solid rgba(10, 200, 185, 0.1); pointer-events: none;
    }

    /* ゲージの内側（黒い円） */
    #circle-inner {
      width: 180px;
      height: 180px;
      background: var(--blue-2);
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.9), 0 0 15px rgba(0,0,0,0.6);
      border: 2px solid var(--gold-3);
      z-index: 2;
      transition: border-color 0.2s;
    }

    /* 中心テキスト */
    #current-percent {
      font-size: 4.5em;
      font-family: 'Cinzel', serif;
      color: var(--cyan);
      font-weight: bold;
      text-shadow: 0 0 20px rgba(10, 200, 185, 0.5);
      line-height: 1;
      margin-top: 10px;
    }
    #timer-display {
      font-size: 1.4em;
      font-family: 'Courier New', Courier, monospace;
      color: var(--gold-2);
      margin-top: 5px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    /* 100%オーバー時の赤色化クラス */
    .overcharged-ring {
      box-shadow: 0 0 30px rgba(232, 64, 87, 0.5), inset 0 0 20px rgba(232, 64, 87, 0.5) !important;
    }
    .overcharged-inner { border-color: var(--danger) !important; }

    /* タイマーの警告アニメーション */
    .timer-danger { color: var(--danger) !important; animation: pulse 0.5s infinite; text-shadow: 0 0 15px var(--danger); }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

    /* ボタン系 */
    #pour-btn { background: linear-gradient(180deg, var(--cyan), #005a82); color: white; width: 90%; padding: 18px; font-size: 1.2em; border-radius: 50px; border: 2px solid #fff; font-weight: bold; box-shadow: 0 0 20px rgba(10, 200, 185, 0.4); opacity: 0.5; pointer-events: none; margin: 0 auto; display: block; touch-action: manipulation; cursor: pointer; letter-spacing: 2px; user-select: none; }
    #pour-btn.active { opacity: 1; pointer-events: auto; animation: btnFloat 2s infinite ease-in-out; }
    #pour-btn:active { transform: scale(0.95); box-shadow: 0 0 10px rgba(10, 200, 185, 0.4); animation: none; }
    @keyframes btnFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(10, 200, 185, 0.6); } }
    #minigame-result-msg { font-size: 1.3em; font-weight: bold; color: #fff; margin-bottom: 10px; text-shadow: 0 0 10px var(--gold-1); opacity: 0; transition: opacity 0.5s; height: 25px; }

    /* 結果画面 UI */
    #result-image-container { position: relative; width: 160px; height: 160px; margin: 40px auto 30px; }
    #result-image-container::before { content: ''; position: absolute; top: -15px; left: -15px; right: -15px; bottom: -15px; border: 3px dashed var(--gold-1); border-radius: 50%; animation: rotate 20s linear infinite; opacity: 0.5; pointer-events: none; }
    @keyframes rotate { 100% { transform: rotate(360deg); } }
    #result-champ-img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; border: 4px solid var(--gold-1); box-shadow: 0 0 30px rgba(200, 170, 110, 0.4); position: relative; z-index: 5; display: block; box-sizing: border-box; }
    
    #result-name-display { font-size: 1.2em; color: var(--gold-2); margin-bottom: 5px; }
    #result-champ-name { font-size: 2.6em; color: var(--gold-2); margin: 5px 0 15px; font-weight: bold; letter-spacing: 3px; text-shadow: 0 0 15px rgba(200, 170, 110, 0.5); }
    #result-title { font-size: 1.1em; color: var(--gold-1); letter-spacing: 2px; }
    #result-description { color: var(--gold-3); margin: 0 10px 30px; line-height: 1.8; font-size: 1.05em; }
    
    #result-stats { text-align: left; background: rgba(0,0,0,0.4); padding: 30px 20px; border-radius: 4px; border: 1px solid #333; margin-bottom: 40px; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
    .stat-row { margin-bottom: 22px; }
    .stat-labels { display: flex; justify-content: space-between; font-size: 0.85em; margin-bottom: 8px; letter-spacing: 1px; font-weight:bold; }
    .stat-bar-bg { position: relative; width: 100%; height: 8px; background: #111; border-radius: 4px; border: 1px solid #333; }
    .stat-bar-fill { position: absolute; height: 100%; opacity: 0.4; border-radius: 4px; }
    .stat-center-line { position: absolute; left: 50%; width: 2px; height: 16px; top: -5px; background: rgba(255,255,255,0.2); }
    .stat-marker { position: absolute; top: -6px; width: 18px; height: 18px; background: var(--gold-1); border-radius: 50%; transform: translateX(-50%); box-shadow: 0 0 10px var(--gold-1); border: 2px solid #fff; z-index: 2;}
  </style>
</head>
<body>

  <div id="progress-wrapper" class="hidden">
    <div id="progress-container"><div id="progress-bar"></div></div>
  </div>

  <main id="app">
    <section id="start-screen">
      <div style="margin-bottom: 30px;">
        <img src="https://ddragon.leagueoflegends.com/cdn/14.21.1/img/profileicon/29.png" alt="logo" style="width:110px; border-radius:50%; border:3px solid var(--gold-1); box-shadow: 0 0 20px rgba(200, 170, 110, 0.3);">
      </div>
      <h1 style="font-size: 2.2em; margin-bottom: 15px;">魂のチャンピオン診断</h1>
      <p style="color: var(--gold-3); line-height: 1.8; margin-bottom: 30px; font-size: 1.05em;">
        全24問の心理テストと「リミットテスト」で<br>
        <span style="color:var(--gold-1); font-weight:bold;">運命のチャンピオン</span>を導き出します。
      </p>

      <div class="input-group">
        <label for="user-name">プレイヤーネーム</label>
        <input type="text" id="user-name" placeholder="二階堂流し満貫" maxlength="20">
      </div>
      <button class="action-btn btn-gold" onclick="startQuiz()">診断を開始する</button>
    </section>

    <section id="quiz-screen" class="hidden">
      <div id="question-container"></div>
      
      <div id="quiz-buttons">
        <button id="prev-btn" class="action-btn btn-gray" onclick="goToPrevPage()">◀ 前へ</button>
        <button id="next-btn" class="action-btn" onclick="goToNextPage()">次へ ▶</button>
      </div>
    </section>

    <section id="minigame-screen" class="hidden">
      <h2>最終試練：リミットテスト</h2>
      <p>
        制限時間は<strong style="color:var(--danger); font-size:1.1em;">4秒</strong>。<br>
        <span style="color:var(--cyan); font-weight:bold;">「注ぐ」を長押しし、100%ジャストを狙え！</span>
      </p>
      
      <div id="minigame-result-msg"></div>
      
      <div id="circle-ui-container">
        <div id="target-marker"></div>
        <div id="circle-progress">
          <div id="circle-inner">
            <div id="current-percent">0<span style="font-size: 0.4em;">%</span></div>
            <div id="timer-display">4.00</div>
          </div>
        </div>
      </div>

      <button id="start-minigame-btn" class="action-btn btn-gold" onclick="runMinigame()">テストを開始する</button>
      <button id="pour-btn" class="hidden">魔力を注ぐ (HOLD)</button>
    </section>

    <section id="result-screen" class="hidden">
      <h2 style="font-size: 1.3em; color: var(--gold-3); margin-bottom: 0;">あなたの魂のチャンピオンは…</h2>
      <div id="result-image-container"><img id="result-champ-img" src="" alt="champion"></div>
      <div id="result-name-display"><span id="display-user-name" style="color:#fff; font-weight:bold;"></span> に導かれし者</div>
      <div id="result-title">称号</div>
      <div id="result-champ-name">チャンピオン名</div>
      <p id="result-role" style="color: var(--cyan); margin-bottom: 15px; font-size: 1.1em; font-weight:bold; letter-spacing: 1px;"></p>
      <p id="result-description">説明文</p>
      
      <h3 style="font-size: 1.4em; text-align: center; margin-bottom: 20px; border-bottom: 1px solid rgba(200, 170, 110, 0.3); padding-bottom: 10px;">プレイスタイル分析</h3>
      <div id="result-stats"></div>
      
      <button class="action-btn btn-gold" onclick="location.reload()">もう一度診断する</button>
    </section>

  </main>

  <script>
    const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxtbmCM5ElVC3kGYu2hUcMgmQbsU8bvxN4AL6vd2GAX_RnzKDjt7kK9_sesQ5PNOr26/exec";

    // 6軸のステータスキー定義
    const questions = [
      { id: 1, text: "Q1. 朝、目覚まし時計が鳴りました。あなたの行動は？", choices: [
        { text: "鳴る前に起きて準備万端", stats: { valMacro: 2, valLate: -2 } },
        { text: "鳴った瞬間に飛び起きる", stats: { valMacro: -1, valLate: -1, valImmobile: -1 } },
        { text: "スヌーズを5回繰り返して粘る", stats: { valLate: 1, valImmobile: 1, valSustain: 1 } },
        { text: "目覚ましを破壊して二度寝する", stats: { valTeam: -2, valMacro: -2, valRange: -1 } }
      ]},
      { id: 2, text: "Q2. スーパーのレジ待ち。前の人が小銭をぶちまけました。どうする？", choices: [
        { text: "「大丈夫ですか？」と真っ先に一緒に拾う", stats: { valTeam: 2, valRange: -1, valSustain: 1 } },
        { text: "黙って拾い終わるのを静かに見守る", stats: { valMacro: 1, valRange: 2, valImmobile: 1 } },
        { text: "舌打ちして隣のレジへ即移動する", stats: { valTeam: -1, valLate: -2, valImmobile: -1 } },
        { text: "どさくさに紛れて自分のポケットに入れる", stats: { valTeam: -2, valMacro: -2, valSustain: -1 } },
        { text: "「あ、あっちにも転がっていきましたよ」と適当な嘘", stats: { valTeam: -1, valMacro: -2, valRange: 2 } }
      ]},
      { id: 3, text: "Q3. 宝くじで1億円当たりました。使い道は？", choices: [
        { text: "全額貯金して資産運用を計画する", stats: { valMacro: 2, valLate: 2, valImmobile: 1 } },
        { text: "家族や世話になった人に豪華なプレゼント", stats: { valTeam: 2, valSustain: 1 } },
        { text: "欲しかった高級車と家を即買いする", stats: { valTeam: -1, valLate: -2, valSustain: -1 } },
        { text: "カジノに行って全額倍押し勝負に出る", stats: { valTeam: -2, valMacro: -2, valImmobile: -2 } }
      ]},
      { id: 4, text: "Q4. 新しい家電を買いました。説明書はどう読む？", choices: [
        { text: "最初から最後まで熟読してから触る", stats: { valMacro: 2, valLate: 1, valImmobile: 1 } },
        { text: "分からない所だけ辞書的に引く", stats: { valMacro: 1, valSustain: 1 } },
        { text: "図解だけ見てなんとなく把握する", stats: { valMacro: -1, valImmobile: -1 } },
        { text: "読まずにとりあえず適当にボタンを押す", stats: { valMacro: -2, valLate: -2, valSustain: -1 } },
        { text: "誰かに設定を全部やらせて、使い方だけ教わる", stats: { valTeam: -2, valImmobile: 2 } }
      ]},
      { id: 5, text: "Q5. グループでの旅行。あなたの役割は？", choices: [
        { text: "完璧な分刻みのしおりを作る", stats: { valMacro: 2, valImmobile: 1, valLate: 1 } },
        { text: "運転や荷物持ちを率先してやる", stats: { valTeam: 2, valRange: -2, valSustain: 1 } },
        { text: "行きたい所だけわがままに指定する", stats: { valTeam: -2, valLate: -1, valSustain: -1 } },
        { text: "当日の気分で勝手に行き先を変える", stats: { valMacro: -2, valImmobile: -2 } }
      ]},
      { id: 6, text: "Q6. 目の前に「絶対に押すな」というボタンがあります。", choices: [
        { text: "触れずにその場を立ち去る", stats: { valMacro: 2, valRange: 2, valLate: 1 } },
        { text: "誰かに押させて安全か様子を見る", stats: { valTeam: -1, valMacro: 1, valRange: 1 } },
        { text: "警告の意味や構造をじっくり考察する", stats: { valMacro: 1, valImmobile: 2 } },
        { text: "迷わず連打して何が起きるか楽しむ", stats: { valTeam: -2, valMacro: -2, valRange: -2 } },
        { text: "ボタンと一緒に自撮りだけして帰る", stats: { valMacro: -1, valImmobile: -2, valRange: 1 } }
      ]},
      { id: 7, text: "Q7. 迷子の子犬を見つけました。", choices: [
        { text: "保健所や警察に連絡し、最善の対応をとる", stats: { valMacro: 1, valTeam: 1, valImmobile: 1 } },
        { text: "飼い主が見つかるまで自宅で大事に育てる", stats: { valTeam: 2, valLate: 1, valSustain: 2 } },
        { text: "誰か拾うだろうと可哀想だがスルーする", stats: { valTeam: -1, valRange: 1, valLate: -1 } },
        { text: "猛獣に育つようスパルタで鍛え上げる", stats: { valTeam: -2, valMacro: -2, valRange: -1 } }
      ]},
      { id: 8, text: "Q8. カフェで注文と違う品が来ました。", choices: [
        { text: "「これ違います」とはっきり指摘して替えてもらう", stats: { valTeam: -1, valMacro: -1, valRange: -1 } },
        { text: "申し訳ないので何も言わずにそのまま食べる", stats: { valTeam: 2, valImmobile: 1, valLate: 1 } },
        { text: "店員のミスを論理的に詰め寄る", stats: { valMacro: 2, valSustain: -1, valLate: -1 } },
        { text: "自分の注文を忘れたフリをして楽しむ", stats: { valMacro: -2, valImmobile: -2 } },
        { text: "「違います」と返金させつつ、間違った品も食べる", stats: { valTeam: -2, valLate: -2, valRange: -2 } }
      ]},

      if (!nameInput) { alert("プレイヤーネームを入力してください！"); return; }
      userName = nameInput;
      document.getElementById("start-screen").classList.add("hidden");
      document.getElementById("quiz-screen").classList.remove("hidden");
      document.getElementById("progress-wrapper").classList.remove("hidden");
      renderQuestions();
    }

    function updateProgress() {
      const answeredCount = Object.keys(userAnswers).length;
      document.getElementById("progress-bar").style.width = (answeredCount / questions.length) * 100 + "%";
    }

    function renderQuestions() {
      updateProgress();
      document.getElementById("prev-btn").style.display = currentPage === 0 ? "none" : "block";
      const container = document.getElementById("question-container");
      container.innerHTML = "";
      const startIndex = currentPage * QUESTIONS_PER_PAGE;
      const endIndex = Math.min(startIndex + QUESTIONS_PER_PAGE, questions.length);
      for (let i = startIndex; i < endIndex; i++) {
        const q = questions[i];
        const qBlock = document.createElement("div");
        qBlock.className = "question-block";
        const qText = document.createElement("div");
        qText.className = "question-text";
        qText.innerText = q.text;
        qBlock.appendChild(qText);
        q.choices.forEach((choice, index) => {
          const btn = document.createElement("button");
          btn.className = "choice-btn";
          btn.innerText = choice.text;
          if (userAnswers[q.id]?.index === index) btn.classList.add("selected");
          else if (userAnswers[q.id]) btn.classList.add("dimmed");
          btn.onclick = () => {
            qBlock.querySelectorAll(".choice-btn").forEach(b => { b.classList.remove("selected"); b.classList.add("dimmed"); });
            btn.classList.remove("dimmed"); btn.classList.add("selected");
            userAnswers[q.id] = { index: index, stats: choice.stats };
            updateProgress();
          };
          qBlock.appendChild(btn);
        });
        container.appendChild(qBlock);
      }
    }

    function goToPrevPage() {
      if (currentPage > 0) {
        currentPage--;
        window.scrollTo({ top: 0, behavior: 'smooth' });
        renderQuestions();
      }
    }

    function goToNextPage() {
      const startIndex = currentPage * QUESTIONS_PER_PAGE;
      const endIndex = Math.min(startIndex + QUESTIONS_PER_PAGE, questions.length);
      for (let i = startIndex; i < endIndex; i++) {
        if (!userAnswers[questions[i].id]) { alert("すべての質問に回答してください！"); return; }
      }
      currentPage++;
      window.scrollTo({ top: 0, behavior: 'smooth' });
      if (currentPage * QUESTIONS_PER_PAGE >= questions.length) {
        document.getElementById("quiz-screen").classList.add("hidden");
        document.getElementById("progress-wrapper").classList.add("hidden");
        document.getElementById("minigame-screen").classList.remove("hidden");
      } else { 
        renderQuestions(); 
      }
    }

    const pourBtn = document.getElementById("pour-btn");
    const percentText = document.getElementById("current-percent");
    const timerDisplay = document.getElementById("timer-display");
    const circleProgress = document.getElementById("circle-progress");
    const circleInner = document.getElementById("circle-inner");
    const MAX_TIME = 4.00;
    const POUR_SPEED = 100.5;
    let fillAmount = 0;   
    let clickCount = 0;   
    let isPouring = false;
    let isGameRunning = false;
    let gameStartTime = 0;
    let animationFrameId;

    function runMinigame() {
      document.getElementById("start-minigame-btn").classList.add("hidden");
      pourBtn.classList.remove("hidden");
      pourBtn.classList.add("active");
      isGameRunning = true;
      gameStartTime = performance.now();
      animationFrameId = requestAnimationFrame(gameLoop);
    }

    function gameLoop(currentTime) {
      if (!isGameRunning) return;
      const elapsedSeconds = (currentTime - gameStartTime) / 1000;
      let timeLeft = Math.max(MAX_TIME - elapsedSeconds, 0);
      timerDisplay.innerText = timeLeft.toFixed(2);
      if (timeLeft <= 1.50) timerDisplay.classList.add("timer-danger");
      if (isPouring) {
        fillAmount += POUR_SPEED * (1 / 60); 
        updateVisuals();
        if (fillAmount >= 125) stopPouring();
      }
      if (timeLeft <= 0) finishMinigame();
      else animationFrameId = requestAnimationFrame(gameLoop);
    }

    function startPouring(e) {
      if (e) e.preventDefault(); 
      if (!isGameRunning || fillAmount >= 125) return; 
      isPouring = true;
      clickCount++;
    }

    function stopPouring(e) {
      if (e) e.preventDefault();
      isPouring = false;
    }

    function updateVisuals() {
      const displayPercent = Math.floor(fillAmount);
      percentText.innerHTML = `${displayPercent}<span style="font-size: 0.4em;">%</span>`;
      const degree = (fillAmount / 100) * 360;
      if (displayPercent > 100) {
        circleProgress.style.background = `conic-gradient(var(--danger) ${degree}deg, transparent 0deg)`;
        percentText.style.color = "var(--danger)";
        circleProgress.classList.add("overcharged-ring");
        circleInner.classList.add("overcharged-inner");
      } else {
        circleProgress.style.background = `conic-gradient(var(--cyan) ${degree}deg, transparent 0deg)`;
        percentText.style.color = "var(--cyan)";
        circleProgress.classList.remove("overcharged-ring");
        circleInner.classList.remove("overcharged-inner");
      }
    }

    pourBtn.addEventListener("mousedown", startPouring);
    pourBtn.addEventListener("mouseup", stopPouring);
    pourBtn.addEventListener("mouseleave", stopPouring);
    pourBtn.addEventListener("touchstart", startPouring, {passive: false});
    pourBtn.addEventListener("touchend", stopPouring, {passive: false});

    function finishMinigame() {
      isGameRunning = false;
      cancelAnimationFrame(animationFrameId);
      pourBtn.classList.remove("active");
      timerDisplay.classList.remove("timer-danger");
      let finalPercent = Math.floor(fillAmount);
      let titleColor = "#fff";
      if (finalPercent >= 111) { titleColor = "var(--danger)"; minigameStats.valTeam -= 6; minigameStats.valMacro -= 6; }
      else if (finalPercent >= 104) { titleColor = "#e67e22"; minigameStats.valMacro -= 4; minigameStats.valSustain -= 3; }
      else if (finalPercent >= 101) { titleColor = "#f1c40f"; minigameStats.valSustain -= 2; minigameStats.valImmobile -= 2; }
      else if (finalPercent === 100) { titleColor = "var(--gold-1)"; minigameStats.valMacro += 5; minigameStats.valImmobile -= 5; minigameStats.valTeam += 5; }
      else if (finalPercent >= 98) { titleColor = "var(--cyan)"; minigameStats.valMacro -= 2; minigameStats.valImmobile -= 4; }
      else if (finalPercent >= 94) { titleColor = "#3498db"; minigameStats.valMacro += 4; minigameStats.valLate += 3; }
      else { titleColor = "#95a5a6"; minigameStats.valRange += 5; minigameStats.valTeam += 2; minigameStats.valLate += 3; }

      const msgEl = document.getElementById("minigame-result-msg");
      msgEl.innerHTML = `<span style="color:${titleColor}">${finalPercent}%</span>`;
      msgEl.style.opacity = 1;

      setTimeout(() => calculateResult(finalPercent, clickCount), 3000);
    }

    function calculateResult(finalPercent, finalClickCount) {
      let raw = { ...minigameStats };
      let answersArr = [];
      for (const k in userAnswers) {
        const s = userAnswers[k].stats;
        answersArr.push(userAnswers[k].index + 1); 
        for (const a in raw) { raw[a] = (raw[a] || 0) + (s[a] || 0); }
      }
      const mapScale = (v) => Math.max(-10, Math.min(10, Math.round((v / 30) * 10)));
      const userPoint = { 
        valMacro: mapScale(raw.valMacro), valTeam: mapScale(raw.valTeam), 
        valLate: mapScale(raw.valLate), valRange: mapScale(raw.valRange),
        valImmobile: mapScale(raw.valImmobile), valSustain: mapScale(raw.valSustain)
      };
      let best = allChampions[0];
let maxSim = -9999; // 最大の類似度を記録する変数

// ユーザーのスコアベクトルの大きさ（長さを計算）
const userMag = Math.sqrt(Object.values(userPoint).reduce((sum, val) => sum + val * val, 0));

allChampions.forEach(c => {
  let dotProduct = 0;
  // ユーザーと各チャンピオンの「内積」を計算
  for (const key in userPoint) {
    dotProduct += userPoint[key] * c.stats[key];
  }
  
  // チャンピオンのスコアベクトルの大きさ
  const champMag = Math.sqrt(Object.values(c.stats).reduce((sum, val) => sum + val * val, 0));

  // コサイン類似度を計算（0除算を防ぐ処理含む）
  const similarity = (userMag === 0 || champMag === 0) ? 0 : dotProduct / (userMag * champMag);

  // 最も類似度が高い（グラフの形が似ている）チャンピオンを更新
  if (similarity > maxSim) {
    maxSim = similarity;
    best = c;
  }
});
      window.scrollTo({ top: 0, behavior: 'smooth' });
      document.getElementById("minigame-screen").classList.add("hidden");
      document.getElementById("result-screen").classList.remove("hidden");
      document.getElementById("display-user-name").innerText = userName;
      document.getElementById("result-champ-img").src = `https://ddragon.leagueoflegends.com/cdn/14.21.1/img/champion/${best.id}.png`;
      document.getElementById("result-title").innerText = `「${best.title}」`;
      document.getElementById("result-champ-name").innerText = best.name;
      document.getElementById("result-description").innerText = best.description;
      document.getElementById("result-role").innerText = `適正ロール: ${best.role}`;

      const renderSpectrum = (l, r, v, cl, cr) => {
        const ratio = ((v + 10) / 20) * 100;
        return `<div class="stat-row"><div class="stat-labels"><span style="color:${cl};">${l}</span><span style="color:${cr};">${r}</span></div><div class="stat-bar-bg"><div class="stat-bar-fill" style="width:100%; background:linear-gradient(90deg,${cl},${cr});"></div><div class="stat-center-line"></div><div class="stat-marker" style="left:${ratio}%;"></div></div></div>`;
      };
      document.getElementById("result-stats").innerHTML = renderSpectrum("直感・ミクロ", "論理・マクロ", userPoint.valMacro, "#b366ff", "#0ac8b9") + renderSpectrum("自己中・エゴ", "献身・利他", userPoint.valTeam, "#e84057", "#27ae60") + renderSpectrum("序盤スノーボール", "終盤スケール", userPoint.valLate, "#d4b87e", "#9b59b6") + renderSpectrum("近接・メレー", "遠距離・レンジ", userPoint.valRange, "#e67e22", "#3498db") + renderSpectrum("機動・アサシン", "不動・どっしり", userPoint.valImmobile, "#f1c40f", "#7f8c8d") + renderSpectrum("バースト・瞬間火力", "持続・タンク", userPoint.valSustain, "#e74c3c", "#2ecc71");

      sendDataToGAS(best.name, userPoint, answersArr, finalPercent, finalClickCount);
    }

    function sendDataToGAS(championName, scorePoint, answersArr, finalPercent, finalClickCount) {
      const summaryStr = `論理:${scorePoint.valMacro},利他:${scorePoint.valTeam},終盤:${scorePoint.valLate},遠距離:${scorePoint.valRange},不動:${scorePoint.valImmobile},持続:${scorePoint.valSustain}`;
      fetch('https://ipinfo.io/json').then(res => res.json()).then(data => {
        executeSend((data.region && data.city) ? `${data.region}, ${data.city}` : "不明");
      }).catch(() => {
        fetch('https://get.geojs.io/v1/ip/geo.json').then(res => res.json()).then(data => {
          executeSend((data.region && data.city) ? `${data.region}, ${data.city}` : "不明");
        }).catch(() => executeSend("取得不可"));
      });

      function executeSend(loc) {
        const payload = {
          name: userName,
          location: loc,
          champion: championName,
          score_summary: summaryStr,
          answers: answersArr,
          final_percent: finalPercent,     // ここで送信
          click_count: finalClickCount     // ここで送信
        };
        fetch(GAS_WEBAPP_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) })
        .then(() => console.log("Success")).catch(() => console.error("Error"));
      }
    }
  </script>
